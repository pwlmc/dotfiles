# Use a big scrollback
set -g history-limit 200000

# Mouse support: scroll, select panes, resize borders
set -g mouse on

# --- Background activity notifications ---
# Highlight the window in the status bar when a background pane has output
set -g monitor-activity on
set -g visual-activity on

# Also react to terminal bell (useful if you wrap Claude to emit a bell)
set -g monitor-bell on
set -g visual-bell on
set -g bell-action any

# Keep status bar enabled (needed for activity indication)
set -g status on
set -g status-interval 2

# Make activity more visible: show a message when activity occurs
set -g display-time 2000
set -g visual-activity on

# Faster escape from prefix sequences
set -sg escape-time 10

# More intuitive splits (optional but handy)
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# PageUp enters scroll mode
bind -n PageUp copy-mode -u

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
