# Use a big scrollback
set -g history-limit 200000

# Enable xterm key handling for eg. shift-select in micro
set -g xterm-keys on

# Terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Mouse support: scroll, select panes, resize borders
set -g mouse on

# --- Background activity notifications ---
# Highlight the window in the status bar when a background pane has output
set -g monitor-activity on
set -g visual-activity on

# Also react to terminal bell (useful if you wrap Claude to emit a bell)
set -g monitor-bell on
set -g visual-bell on
set -g bell-action any

# Keep status bar enabled (needed for activity indication)
set -g status on
set -g status-interval 2

# Make activity more visible: show a message when activity occurs
set -g display-time 2000
set -g visual-activity on

# Faster escape from prefix sequences
set -sg escape-time 10

# More intuitive splits (optional but handy)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# PageUp enters scroll mode
bind -n PageUp copy-mode -u

# Panel customization
set -g status-right-length 150
set -g status-right '#{s|#{HOME}|~|:pane_current_path} #(git -C "#{pane_current_path}" branch --show-current 2>/dev/null | sed "s/^/(/;s/$/)/")'

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
